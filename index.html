<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kickoff'26 — GenAI Stadium Intelligence & Fan Experience Platform for FIFA World Cup 2026" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com; img-src 'self' data: https:; child-src 'none'; object-src 'none';" />
  <title>Kickoff'26 · Stadium Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ======================= APP SHELL ======================= -->
  <div id="app">

    <!-- ---------- Sidebar ---------- -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="26" height="26"><path fill="currentColor" d="M16 2a14 14 0 1 0 0 28 14 14 0 0 0 0-28Zm0 2.2 3.1 2.3-1.2 3.6h-3.8L12.9 6.5 16 4.2Zm-7.6 5.3 3.7.1 1.2 3.6-3 2.3-2.9-2.1 1-3.9Zm15.2 0 1 3.9-2.9 2.1-3-2.3 1.2-3.6 3.7-.1ZM16 12.7l3.4 2.5-1.3 4h-4.2l-1.3-4 3.4-2.5ZM7.2 18.9l2.9-2.1 3 2.3-1.1 3.9-3.6.6-1.2-4.7Zm17.6 0-1.2 4.7-3.6-.6-1.1-3.9 3-2.3 2.9 2.1ZM16 24.2l3.3.5-2 3.3a11.8 11.8 0 0 1-2.6 0l-2-3.3 3.3-.5Z"/></svg>
        </div>
        <div class="brand-text">
          <strong>Kickoff'26</strong>
          <span>Stadium Intelligence</span>
        </div>
      </div>

      <nav class="nav" id="nav" aria-label="Primary">
        <button class="nav-item" data-view="dashboard">
          <span class="ni-ico">▚</span><span>Command Center</span>
        </button>
        <button class="nav-item" data-view="concierge">
          <span class="ni-ico">✦</span><span>AI Concierge</span><span class="ni-tag">GenAI</span>
        </button>
        <button class="nav-item" data-view="navigation">
          <span class="ni-ico">➤</span><span>Wayfinding</span>
        </button>
        <button class="nav-item" data-view="crowd">
          <span class="ni-ico">◉</span><span>Crowd Flow</span>
        </button>
        <button class="nav-item" data-view="transport">
          <span class="ni-ico">⤳</span><span>Transport</span>
        </button>
        <button class="nav-item" data-view="access">
          <span class="ni-ico">♿</span><span>Accessibility</span>
        </button>
        <button class="nav-item" data-view="sustainability">
          <span class="ni-ico">♲</span><span>Sustainability</span>
        </button>
        <div class="nav-sep">Operations</div>
        <button class="nav-item" data-view="settings">
          <span class="ni-ico">⚙</span><span>Settings & AI</span>
        </button>
      </nav>

      <footer class="sidebar-foot">
        <div class="ai-status" id="aiStatus">
          <span class="dot"></span><span id="aiStatusText">Simulated AI</span>
        </div>
        <p class="foot-note">Demo data · not affiliated with FIFA</p>
      </footer>
    </aside>

    <!-- ---------- Main ---------- -->
    <div class="main">
      <!-- Topbar -->
      <header class="topbar">
        <button class="icon-btn hamb" id="hamb" aria-label="Toggle menu">☰</button>
        <div class="venue-select">
          <label for="venueSel" class="sr-only">Select Venue</label>
          <span class="vs-ico" aria-hidden="true">📍</span>
          <select id="venueSel" aria-label="Select venue"></select>
        </div>
        <div class="topbar-spacer"></div>
        <div class="match-chip" id="matchChip" title="Next kickoff at this venue"></div>
        <div class="lang-wrap">
          <label for="langSel" class="sr-only">Select Language</label>
          <span class="vs-ico" aria-hidden="true">🌐</span>
          <select id="langSel" aria-label="Language"></select>
        </div>
        <div class="clock" id="clock">--:--</div>
      </header>

      <!-- View container -->
      <main class="view" id="view" tabindex="-1"></main>
    </div>
  </div>

  <!-- Toast host -->
  <div id="toasts" class="toasts" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/anim.js"></script>
  <script src="js/live.js"></script>
  <script src="js/gateflow.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
